<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 AI Prompt 智能寶庫</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans TC', -apple-system, sans-serif;
    background: #f0f2f5;
    color: #1a1a1a;
    min-height: 100vh;
  }
  .site-header { text-align: center; padding: 36px 20px 0; }
  .site-header h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .sheet-link { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; color: #555; text-decoration: none; }
  .sheet-link:hover { text-decoration: underline; }
  .search-wrap { max-width: 560px; margin: 24px auto 0; padding: 0 20px; position: relative; }
  .search-icon { position: absolute; left: 36px; top: 50%; transform: translateY(-50%); color: #aaa; pointer-events: none; }
  #search { width: 100%; padding: 12px 20px 12px 40px; border: 1.5px solid #e0e0e0; border-radius: 30px; font-size: 15px; font-family: inherit; background: #fff; outline: none; box-shadow: 0 1px 4px rgba(0,0,0,.06); transition: border-color .2s, box-shadow .2s; }
  #search::placeholder { color: #bbb; }
  #search:focus { border-color: #4a90e2; box-shadow: 0 0 0 3px rgba(74,144,226,.12); }
  .filters-wrap { max-width: 900px; margin: 18px auto 0; padding: 0 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
  .filter-btn { padding: 6px 16px; border-radius: 20px; border: 1.5px solid #d5d5d5; background: #fff; color: #444; font-size: 13.5px; font-family: inherit; cursor: pointer; transition: all .15s; white-space: nowrap; font-weight: 500; }
  .filter-btn:hover { border-color: #4a90e2; color: #4a90e2; }
  .filter-btn.active { background: #4a90e2; border-color: #4a90e2; color: #fff; }
  .main-content { max-width: 1200px; margin: 32px auto 60px; padding: 0 20px; }
  .group-header { font-size: 18px; font-weight: 700; color: #222; margin: 36px 0 18px; display: flex; align-items: center; gap: 8px; }
  .group-header:first-child { margin-top: 0; }
  .cards-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .card { background: #fff; border-radius: 14px; border: 2px solid #e8e8e8; padding: 18px 18px 16px; display: flex; flex-direction: column; gap: 10px; transition: transform .2s, box-shadow .2s; animation: fadeUp .35s ease both; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--card-color, #4a90e2); }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,.09); }
  .card-tag { display: inline-block; font-size: 11.5px; font-weight: 600; color: var(--tag-text, #4a90e2); background: var(--tag-bg, #e3f0fd); padding: 3px 10px; border-radius: 20px; align-self: flex-start; }
  .card-title { font-size: 17px; font-weight: 700; color: #111; line-height: 1.35; }
  .card-body { font-size: 13px; color: #666; line-height: 1.75; flex: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 7; -webkit-box-orient: vertical; white-space: pre-line; }
  .copy-btn { width: 100%; padding: 10px; margin-top: 4px; border-radius: 8px; border: none; background: #4a90e2; color: #fff; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background .15s, transform .1s; }
  .copy-btn:hover { background: #357abd; }
  .copy-btn:active { transform: scale(.97); }
  .copy-btn.copied { background: #22c55e; }
  .cat-内容创作,.cat-內容創作 { --card-color:#4a90e2; --tag-text:#2271c3; --tag-bg:#e3f0fd; }
  .cat-筆記精煉,.cat-笔记精炼 { --card-color:#9b59b6; --tag-text:#7b3f9e; --tag-bg:#f3e8fb; }
  .cat-程式應用,.cat-程式应用 { --card-color:#27ae60; --tag-text:#1a8a49; --tag-bg:#e4f7ed; }
  .cat-簡報表達,.cat-简报表达 { --card-color:#e67e22; --tag-text:#c0621a; --tag-bg:#fef0e3; }
  .cat-程式生成,.cat-程式生成 { --card-color:#e74c3c; --tag-text:#c0392b; --tag-bg:#fde8e7; }
  .cat-文本優化,.cat-文本优化 { --card-color:#16a085; --tag-text:#0e7a65; --tag-bg:#e0f5f1; }
  .cat-生文校正 { --card-color:#2ecc71; --tag-text:#1eaa5a; --tag-bg:#e4faf0; }
  .cat-專案企劃,.cat-专案企划 { --card-color:#8e44ad; --tag-text:#6c3483; --tag-bg:#f2e7fa; }
  .cat-圖片生成,.cat-图片生成 { --card-color:#f39c12; --tag-text:#c87d0d; --tag-bg:#fef6e3; }
  .cat-筆記整理,.cat-笔记整理 { --card-color:#9b59b6; --tag-text:#7b3f9e; --tag-bg:#f3e8fb; }
  .cat-資訊整理,.cat-资讯整理 { --card-color:#3498db; --tag-text:#2175a8; --tag-bg:#e3f2fd; }
  .cat-心智圖法,.cat-心智图法 { --card-color:#1abc9c; --tag-text:#0e9278; --tag-bg:#e0faf5; }
  .state-msg { text-align: center; padding: 60px 20px; color: #999; font-size: 15px; grid-column: 1/-1; }
  .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid #e5e5e5; border-top-color: #4a90e2; border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px); background: #1e293b; color: #fff; padding: 9px 22px; border-radius: 30px; font-size: 13.5px; opacity: 0; pointer-events: none; transition: opacity .22s, transform .22s; z-index: 999; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  @media (max-width: 1024px) { .cards-grid { grid-template-columns: repeat(3,1fr); } }
  @media (max-width: 720px)  { .cards-grid { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 480px)  { .cards-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header class="site-header">
  <h1>🚀 AI Prompt 智能寶庫</h1>
  <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1KV35oOaFfLXRn-y3d097ryeZxLM0wU0jlC2yZz0IFbY/edit?gid=1480282197" target="_blank" rel="noopener">📊 開啟原始資料 Google Sheet</a>
</header>
<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input id="search" type="text" placeholder="搜尋提示詞...">
</div>
<div class="filters-wrap" id="filters">
  <button class="filter-btn active" data-cat="全部">全部</button>
</div>
<div class="main-content" id="main"></div>
<div id="toast">✅ 已複製到剪貼簿！</div>
<script>
const SHEET_ID='1KV35oOaFfLXRn-y3d097ryeZxLM0wU0jlC2yZz0IFbY';
const GID='1480282197';
const CSV_URL=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;
const CAT_EMOJI={'內容創作':'✍️','筆記精煉':'📝','程式應用':'💻','簡報表達':'🎯','程式生成':'⚙️','文本優化':'✨','生文校正':'🔎','專案企劃':'📋','圖片生成':'🖼️','筆記整理':'🗂️','資訊整理':'📊','心智圖法':'🧠'};
let ALL=[],activeFilter='全部';
window.addEventListener('DOMContentLoaded',()=>{document.getElementById('search').addEventListener('input',render);loadData();});
async function loadData(){
  showLoading();
  try{
    const res=await fetch(CSV_URL);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    ALL=parseCSV(await res.text());
    buildFilters();render();
  }catch(err){
    document.getElementById('main').innerHTML=`<div class="cards-grid"><div class="state-msg">⚠️ 無法載入資料<br><small style="color:#bbb;margin-top:8px;display:block">${err.message}<br>請確認 Google Sheet 已設為「任何人可檢視」</small></div></div>`;
  }
}
function showLoading(){document.getElementById('main').innerHTML=`<div class="cards-grid"><div class="state-msg"><div class="spinner"></div><br>載入中…</div></div>`;}
function parseCSV(raw){
  raw=raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const records=[];let row=[],cur='',inQ=false;
  for(let i=0;i<raw.length;i++){
    const ch=raw[i],nx=raw[i+1];
    if(inQ){if(ch==='"'&&nx==='"'){cur+='"';i++;}else if(ch==='"'){inQ=false;}else{cur+=ch;}}
    else{if(ch==='"'){inQ=true;}else if(ch===','){row.push(cur);cur='';}else if(ch==='\n'){row.push(cur);cur='';records.push(row);row=[];}else{cur+=ch;}}
  }
  if(cur||row.length){row.push(cur);records.push(row);}
  if(records.length<2)return[];
  const headers=records[0].map(h=>h.trim().toLowerCase());
  const ci=kw=>{for(const k of kw){const i=headers.findIndex(h=>h.includes(k));if(i>=0)return i;}return -1;};
  const catI=ci(['類別','分類','cat','category']),titleI=ci(['標題','名稱','title','name','提示詞標題']),bodyI=ci(['內容','prompt','提示詞','正文','body','描述']);
  const items=[];
  for(let i=1;i<records.length;i++){
    const cols=records[i];if(!cols||cols.every(c=>!c.trim()))continue;
    const cat=catI>=0?(cols[catI]||'').trim():'未分類';
    const title=titleI>=0?(cols[titleI]||'').trim():(cols[0]||'').trim();
    const body=bodyI>=0?(cols[bodyI]||'').trim():(cols[cols.length-1]||'').trim();
    if(title||body)items.push({cat,title,body});
  }
  return items;
}
function buildFilters(){
  const cats=['全部',...new Set(ALL.map(p=>p.cat).filter(Boolean))];
  const wrap=document.getElementById('filters');
  wrap.innerHTML=cats.map(c=>`<button class="filter-btn${c==='全部'?' active':''}" data-cat="${esc(c)}">${esc(c)}</button>`).join('');
  wrap.querySelectorAll('.filter-btn').forEach(btn=>btn.addEventListener('click',()=>{
    activeFilter=btn.dataset.cat;
    wrap.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');render();
  }));
}
function render(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const main=document.getElementById('main');
  const filtered=ALL.filter(p=>{
    const mc=activeFilter==='全部'||p.cat===activeFilter;
    const mq=!q||p.title.toLowerCase().includes(q)||p.body.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q);
    return mc&&mq;
  });
  if(!filtered.length){main.innerHTML=`<div class="cards-grid"><div class="state-msg">🔍 找不到符合的提示詞</div></div>`;return;}
  const groups={};filtered.forEach(p=>{(groups[p.cat]=groups[p.cat]||[]).push(p);});
  let html='';
  Object.entries(groups).forEach(([cat,items])=>{
    html+=`<div class="group-header">${CAT_EMOJI[cat]||'📌'} ${esc(cat)}</div><div class="cards-grid">`;
    items.forEach((p,i)=>{
      const cls='cat-'+p.cat.trim().replace(/\s/g,'');
      html+=`<div class="card ${cls}" style="animation-delay:${Math.min(i*.04,.48)}s" data-body="${esc(p.body)}">
        <span class="card-tag">${esc(p.cat)}</span>
        <div class="card-title">${esc(p.title)}</div>
        <div class="card-body">${esc(p.body)}</div>
        <button class="copy-btn" onclick="copyPrompt(this)">複製 Prompt</button>
      </div>`;
    });
    html+=`</div>`;
  });
  main.innerHTML=html;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function copyPrompt(btn){
  const text=btn.closest('.card').dataset.body.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"');
  const done=()=>{btn.textContent='✅ 已複製！';btn.classList.add('copied');showToast();setTimeout(()=>{btn.textContent='複製 Prompt';btn.classList.remove('copied');},2000);};
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));}else{fallbackCopy(text,done);}
}
function fallbackCopy(text,cb){const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);cb();}
function showToast(){const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
</script>
</body>
</html>
